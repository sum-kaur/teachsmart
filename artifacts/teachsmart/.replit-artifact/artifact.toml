kind = "web"
previewPath = "/"
title = "TeachSmart"
version = "1.0.0"
id = "artifacts/teachsmart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21781

[services.development]
run = "pnpm --filter @workspace/teachsmart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/teachsmart", "run", "build" ]
publicDir = "artifacts/teachsmart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21781"
BASE_PATH = "/"
