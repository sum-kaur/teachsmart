openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TeachSmart API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: curriculum
    description: Curriculum alignment and resource operations
  - name: lessons
    description: Lesson plan operations
  - name: dashboard
    description: Dashboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /alignment:
    post:
      operationId: getAlignment
      tags: [curriculum]
      summary: Score curriculum alignment for a topic
      description: Filters matching curriculum outcomes and uses Claude to score alignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlignmentRequestBody"
      responses:
        "200":
          description: Alignment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlignmentResult"

  /resources:
    post:
      operationId: getResources
      tags: [curriculum]
      summary: Find curriculum-aligned resources
      description: Uses Claude to find trusted Australian educational resources for the topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourcesRequestBody"
      responses:
        "200":
          description: Resource results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourcesResult"

  /lesson:
    post:
      operationId: generateLesson
      tags: [lessons]
      summary: Generate a lesson plan
      description: Uses Claude to generate a complete, differentiated lesson plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LessonRequestBody"
      responses:
        "200":
          description: Generated lesson plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonPlan"

  /feed:
    post:
      operationId: getFeed
      tags: [dashboard]
      summary: Get living context feed for teacher's area
      description: Fetches live BOM weather and generates teaching opportunity cards via Claude
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedRequestBody"
      responses:
        "200":
          description: Feed result with weather and teaching opportunity cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResult"

  /resources/recent:
    get:
      operationId: getRecentResources
      tags: [dashboard]
      summary: Get recent resources
      description: Returns recently searched/accessed resources
      responses:
        "200":
          description: List of recent resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentResource"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      description: Returns summary statistics for the teacher dashboard
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AlignmentRequestBody:
      type: object
      properties:
        subject:
          type: string
        yearLevel:
          type: string
        topic:
          type: string
        state:
          type: string
      required:
        - subject
        - yearLevel
        - topic
        - state

    AlignmentOutcome:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
      required:
        - id
        - description

    AlignmentResult:
      type: object
      properties:
        alignmentScore:
          type: integer
        syllabus:
          type: string
        strand:
          type: string
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/AlignmentOutcome"
        notes:
          type: string
        usedFallback:
          type: boolean
      required:
        - alignmentScore
        - syllabus
        - strand
        - outcomes
        - notes
        - usedFallback

    ResourcesRequestBody:
      type: object
      properties:
        subject:
          type: string
        yearLevel:
          type: string
        topic:
          type: string
        state:
          type: string
        alignmentResult:
          $ref: "#/components/schemas/AlignmentResult"
      required:
        - subject
        - yearLevel
        - topic
        - state
        - alignmentResult

    Resource:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
        type:
          type: string
        description:
          type: string
        alignmentScore:
          type: integer
        safetyRating:
          type: string
        biasFlag:
          type: string
        localContextTags:
          type: array
          items:
            type: string
        outcomeIds:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - source
        - type
        - description
        - alignmentScore
        - safetyRating
        - biasFlag
        - localContextTags
        - outcomeIds

    ResourcesResult:
      type: object
      properties:
        resources:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        usedFallback:
          type: boolean
      required:
        - resources
        - usedFallback

    LessonRequestBody:
      type: object
      properties:
        subject:
          type: string
        yearLevel:
          type: string
        topic:
          type: string
        state:
          type: string
        resource:
          $ref: "#/components/schemas/Resource"
        alignmentResult:
          $ref: "#/components/schemas/AlignmentResult"
        classContext:
          type: array
          items:
            type: string
      required:
        - subject
        - yearLevel
        - topic
        - state
        - resource
        - alignmentResult

    LessonActivity:
      type: object
      properties:
        label:
          type: string
        text:
          type: string
      required:
        - label
        - text

    LessonQuestion:
      type: object
      properties:
        q:
          type: string
        difficulty:
          type: string
      required:
        - q
        - difficulty

    LocalExample:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
      required:
        - title
        - body

    LessonPlan:
      type: object
      properties:
        objective:
          type: string
        duration:
          type: string
        activities:
          type: array
          items:
            $ref: "#/components/schemas/LessonActivity"
        localExample:
          $ref: "#/components/schemas/LocalExample"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/LessonQuestion"
        usedFallback:
          type: boolean
      required:
        - objective
        - duration
        - activities
        - localExample
        - questions
        - usedFallback

    FeedRequestBody:
      type: object
      properties:
        postcode:
          type: string
        state:
          type: string
        subject:
          type: string
        yearLevel:
          type: string
      required:
        - postcode
        - state
        - subject
        - yearLevel

    WeatherData:
      type: object
      properties:
        temp:
          type: number
        description:
          type: string
        rainfall:
          type: number
        wind:
          type: number
        city:
          type: string
        usedFallback:
          type: boolean
      required:
        - temp
        - description
        - rainfall
        - wind
        - city
        - usedFallback

    FeedItem:
      type: object
      properties:
        type:
          type: string
        headline:
          type: string
        teachingAngle:
          type: string
        curriculumLink:
          type: string
        icon:
          type: string
      required:
        - type
        - headline
        - teachingAngle
        - curriculumLink
        - icon

    FeedResult:
      type: object
      properties:
        feedItems:
          type: array
          items:
            $ref: "#/components/schemas/FeedItem"
        weather:
          $ref: "#/components/schemas/WeatherData"
        localContext:
          type: object
          properties:
            suburb:
              type: string
            country:
              type: string
            landmarks:
              type: string
          required:
            - suburb
            - country
            - landmarks
        usedFallback:
          type: boolean
      required:
        - feedItems
        - weather
        - localContext
        - usedFallback

    RecentResource:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        subject:
          type: string
        yearLevel:
          type: string
        topic:
          type: string
        alignmentScore:
          type: integer
        searchedAt:
          type: string
      required:
        - id
        - title
        - subject
        - yearLevel
        - topic
        - alignmentScore
        - searchedAt

    DashboardStats:
      type: object
      properties:
        totalSearches:
          type: integer
        resourcesGenerated:
          type: integer
        averageAlignmentScore:
          type: integer
        topSubject:
          type: string
      required:
        - totalSearches
        - resourcesGenerated
        - averageAlignmentScore
        - topSubject
