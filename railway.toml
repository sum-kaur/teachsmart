[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install && pnpm --filter @workspace/teachsmart run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
restartPolicyType = "on_failure"
